<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GlowJournal — Daily Journal</title>

  <!-- GOOGLE FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- BACKGROUND BLURS -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <main class="journal-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">

        <div class="logo-icon">
          <i class="fa-solid fa-feather"></i>
        </div>

        <div>
          <h2>GlowJournal</h2>
          <p>Daily Reflection</p>
        </div>

      </div>

      <div class="sidebar-card">

        <span>Total Entries</span>

        <h1 id="totalEntries">0</h1>

      </div>

      <div class="sidebar-card">

        <span>Current Mood</span>

        <h3 id="selectedMoodText">
          😊 Happy
        </h3>

      </div>

      <div class="sidebar-card quote-card">

        <h4>Today's Quote</h4>

        <p id="quoteText">
          "Every day is a fresh beginning."
        </p>

      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <section class="journal-card">

      <div class="top-bar">

        <div>

          <h1>
            Daily Journal ✨
          </h1>

          <p>
            Capture your thoughts, feelings, memories & beautiful moments.
          </p>

        </div>

        <div class="date-box" id="currentDate"></div>

      </div>

      <!-- MOODS -->
      <div class="mood-section">

        <h3>
          Select Your Mood
        </h3>

        <div class="moods">

          <button class="mood-btn active">
            😊
          </button>

          <button class="mood-btn">
            😌
          </button>

          <button class="mood-btn">
            😔
          </button>

          <button class="mood-btn">
            😴
          </button>

          <button class="mood-btn">
            😎
          </button>

          <button class="mood-btn">
            🤩
          </button>

          <button class="mood-btn">
            😡
          </button>

          <button class="mood-btn">
            🥳
          </button>

        </div>

      </div>

      <!-- JOURNAL -->
      <div class="editor-section">

        <textarea
          id="journalInput"
          placeholder="Write your journal entry here..."
        ></textarea>

        <div class="editor-footer">

          <div class="left-info">

            <span>
              <i class="fa-solid fa-keyboard"></i>
              Characters:
              <strong id="charCount">0</strong>
            </span>

          </div>

          <div class="editor-buttons">

            <button id="clearBtn" class="secondary-btn">
              Clear
            </button>

            <button id="saveBtn">
              <i class="fa-solid fa-book-open"></i>
              Save Entry
            </button>

          </div>

        </div>

      </div>

      <!-- SEARCH -->
      <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search your entries..."
        />

      </div>

      <!-- ENTRIES -->
      <div class="entries-section">

        <div class="section-header">

          <h2>
            Saved Entries
          </h2>

          <button id="deleteAllBtn">
            Delete All
          </button>

        </div>

        <div id="entriesList"></div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
